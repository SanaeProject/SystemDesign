<!DOCTYPE html>
<html lang="ja">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- Bootstrap 5.3.0 -->
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-9ndCyUaIbzAi2FUVXJi0CjmCapSmO7SnpJef0486qhLnuZ2cdeRhO02iuK6FUUVM"
      crossorigin="anonymous"
    />

    <!-- Googleフォント -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@300;500&display=swap"
      rel="stylesheet"
    />

    <!-- 独自スタイルシート -->
    <link href="../css/custom.css" rel="stylesheet" />

    <!-- ＝＝＝　これ以降を編集します　＝＝＝＝＝＝ -->

    <!-- 作成者情報 -->
    <meta name="description" content="2024システムデザインⅠ演習" />
    <meta
      name="author"
      content="クラス:CT1A 学籍番号:20246124 氏名:布目 純大"
    />

    <style>
      main {
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
      }
      section {
        width: 80%;
      }
      .navbar-nav .nav-item {
          margin-right: 45px; /* liタグの間隔を開ける */
      }
      .pending-task-item {
          display: flex;
          justify-content: space-between;
          align-items: center;
      }
      .notification-badge {
          cursor: pointer;
      }
      .notification-item {
          display: flex;
          justify-content: space-between;
          align-items: center;
      }
      .notification-time {
          color: #6c757d;
          font-size: 0.8rem;
      }
    </style>

    <title>Home</title>
  </head>

  <body>
    <!-- ヘッダー挿入 -->
    <header id="header"></header>

    <!-- コンテンツ（ページ表示内容）はここ以降に作成します -->
    <main class="container-fluid p-4">
      <div class="title-container text-center">
        <h1>売上管理システム</h1>
      </div>
      <section class="col-md-8">
        <div class="card mb-3">
          <div class="card-header text-danger opacity-75">
            未完了のタスク
          </div>
          <ul class="list-group list-group-flush">
            <li class="list-group-item pending-task-item">
              <span>月次売上レポート作成</span>
              <span class="badge bg-warning text-dark">期限: 2024/02/28</span>
            </li>
            <li class="list-group-item pending-task-item">
              <span>Q1売上分析資料準備</span>
              <span class="badge bg-danger">緊急</span>
            </li>
            <li class="list-group-item pending-task-item">
              <span>在庫確認と発注</span>
              <span class="badge bg-secondary">保留中</span>
            </li>
          </ul>
        </div>
      </section>

      <section class="col-md-8">
        <div class="card">
          <div class="card-header d-flex justify-content-between align-items-center">
            通知
            <span class="badge bg-danger notification-badge">3</span>
          </div>
          <ul class="list-group list-group-flush">
            <li class="list-group-item notification-item">
              <small>新しい売上データが追加されました</small>
              <small class="notification-time">1/31 10:30</small>
            </li>
            <li class="list-group-item notification-item">
              <small>承認待ちの経費精算があります</small>
              <small class="notification-time">1/31 09:45</small>
            </li>
            <li class="list-group-item notification-item">
              <small>来月の売上予測レポートが準備できました</small>
              <small class="notification-time">1/31 08:15</small>
            </li>
          </ul>
        </div>
      </section>
    </main>
    <!-- コンテンツ（ページ表示内容）ここまで -->

    <!-- BootstrapScript -->
    <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"
      integrity="sha384-geWF76RCwLtnZ8qwWowPQNguL3RmwHVBC9FhGdlKrxdiJJigb/j/68SIy3Te4Bkz"
      crossorigin="anonymous"
    ></script>
                             
    <!-- 独自JavaScript -->
    <script src="../js/custom.js"></script>
          
  </body>
</html>
