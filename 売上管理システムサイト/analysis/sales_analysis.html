    <!-- コンテンツ（ページ表示内容）はここ以降に作成します -->

    <!-- コンテンツ（ページ表示内容）ここまで -->

    <!-- 独自JavaScript -->

    <script>
        window.addEventListener('DOMContentLoaded', function () {
            const parentElement = document.querySelector('.container');

            invoices.forEach((invoice, index) => {
                const rowElement = document.createElement('div');
                const colElement1 = document.createElement('div');
                const colElement2 = document.createElement('div');
                const clientElement = document.createElement('div');
                const chartElement = document.createElement('div');

                rowElement.classList.add('row');
                colElement1.classList.add('col-4');
                clientElement.classList.add('card');
                clientElement.classList.add('client');
                colElement2.classList.add('col-4');
                colElement2.classList.add('flex-fill');
                chartElement.classList.add('card');
                chartElement.classList.add('chart');

                clientElement.innerText = invoice.client;

                colElement1.appendChild(clientElement);
                colElement2.appendChild(chartElement);
                rowElement.appendChild(colElement1);
                rowElement.appendChild(colElement2);
                parentElement.appendChild(rowElement);
            });
        });
    </script>
