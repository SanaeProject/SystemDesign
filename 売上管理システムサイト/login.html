    <title>売上管理システム/ログイン</title>
  
    <style>
      #invalid-username, #invalid-password {
        color: red;
        opacity: 0.5;
        font-size: small;
      }
    </style>

  </head>

  <body class="bg-light bg-opacity-25 container pt-5">
    <!-- コンテンツ（ページ表示内容）はここ以降に作成します -->
    <div class="bg-dark bg-opacity-25 rounded-4 container py-5">
        <h1 class="text-center text-light-emphasis">売上管理システム</h1>
        <form id="login" class="mx-auto" style="max-width: 400px;">
            <div class="mb-3">
                <label for="username" class="form-label">社員コード
                </label>
                <input type="text" class="form-control" id="username" placeholder="ユーザー名を入力" required>
                <p id="invalid-username"></p>
            </div>
            <div class="mb-3">
                <label for="password" class="form-label">パスワード</label>
                <input type="password" class="form-control" id="password" placeholder="パスワードを入力" required>
                <p id="invalid-password"></p>
            </div>
            <button value="./home/home.html" type="submit" class="btn btn-outline-dark w-100">ログイン</button>
        </form>
    </div>
    <!-- コンテンツ（ページ表示内容）ここまで -->

    <!--  ＝＝＝　これ以降は、共通部分。編集しないでください　＝＝＝＝＝＝ -->
    <!-- BootstrapScript -->
    <script
        src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-geWF76RCwLtnZ8qwWowPQNguL3RmwHVBC9FhGdlKrxdiJJigb/j/68SIy3Te4Bkz"
        crossorigin="anonymous"
    ></script>
    <!-- ログイン処理(仮) -->
    <script>
      function handleLocationClick(pLoc, e) {
        const href = e.getAttribute('value');
        const url = new URL(href, window.location);  // 現在のオリジンを基準に相対パスを解決
        // alert(url);
        url.searchParams.set('pLoc', pLoc);
        window.location.href = url.toString();
        return false;
      }

      document.getElementById("login").addEventListener("submit", function(e) {
          e.preventDefault();
          const username = document.getElementById("username").value;
          const password = document.getElementById("password").value;
          const clickElement = e.currentTarget.lastElementChild;

          let correct = 0;

          if (username === 'admin') {
            document.getElementById('invalid-username').innerText = " ";
            correct++;
          } else {
            document.getElementById('invalid-username').innerText = '社員コードが間違っています。';
          }

          if (password === "admin") {
            document.getElementById('invalid-password').innerText = " ";
            correct++;
          } else {
            document.getElementById('invalid-password').innerText = 'パスワードが間違っています。';
          }

          if (correct == 2) {
            handleLocationClick('ホーム', clickElement);
          }
      });
    </script>

    </body>
</html>
