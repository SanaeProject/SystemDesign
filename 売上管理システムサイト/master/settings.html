<!DOCTYPE html>
<html lang="ja">
  <head>
    <meta charset="utf-8" >
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- Bootstrap 5.3.0 -->
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-9ndCyUaIbzAi2FUVXJi0CjmCapSmO7SnpJef0486qhLnuZ2cdeRhO02iuK6FUUVM"
      crossorigin="anonymous"
    >

    <!-- Googleフォント -->
    <link rel="preconnect" href="https://fonts.googleapis.com" >
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin >
    <link
      href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@300;500&display=swap"
      rel="stylesheet"
   >

    <!-- 独自スタイルシート -->
    <link href="../css/custom.css" rel="stylesheet">

    <style>
      main {
        height: 100%;
        display: flex;
        flex-direction: row;
      }
      .side-nav {
        display: flex;
        flex-direction: column;
        flex-wrap: wrap;
        align-content: center;
      }
      .side-nav-item {
        margin-top: 20px;
      }
      .side-nav-link {
        color: black;
        text-decoration: none;
        padding-left: 5px;
      }
      .side-nav-link:link{
        color: black;
      }
      .side-nav-link:visited{
        color: black;
      }
      .side-nav-link:hover{
        color: black;
        opacity: 0.7;
      }
      .side-nav-item:hover {
        padding-left: 2px;
        border-inline-start: 3px double #c0c0c0;
      }
      .side-nav-link:active{
        color: black;
      }
      .current-location {
        border-inline-start: 3px solid #c0c0c0;
        padding-left: 2px;
      }
      .current-location:hover {
        border-inline-start: 3px solid #c0c0c0;
        padding-left: 2px;
      }
      .sidebar-section {
        min-width: 200px;
        border-inline-end: 1px solid #f8f9fa;
      }
      .main-section {
        width: 80%;
      }
      .page-content {
        height: 100vh;
        padding-top: 10px;
        border-top-left-radius: 50px;
      }
      @media  screen and (max-width: 600px) {
        main {
          flex-direction: column;
        }
        .main-section {
          width: 100%;
        }
        .page-content {
          padding: 20px 10px;
          border-radius: 50px;
          background-color: #f8f9fa;
          box-shadow: 0 1rem 3rem #a0a0a0;
        }
        .sidebar-section {
          border-inline-end: none;
        }
        .side-nav-item {
          width: 100px;
        }
      }
    </style>

    <!-- ＝＝＝　これ以降を編集します　＝＝＝＝＝＝ -->

    <!-- 作成者情報 -->
    <meta name="description" content="2024システムデザインⅠ演習">
    <meta
      name="author"
      content="クラス:CT1 学籍番号:20246124 氏名:布目 純大"
   >

    <title>settings</title>
  </head>

  <body>
    <!-- ヘッダー挿入 -->
    <header id="header"></header>

    <!-- コンテンツ（ページ表示内容）はここ以降に作成します -->
    <main class="flex">
      <h1 class="d-none">スケルトン(見えないよ)</h1>
      <!-- サイドバーセクション -->
      <section class="sidebar-section flex-fill">
        <ul class="side-nav list-unstyled p-3">
          <li class="side-nav-item current-location">
            <a class="side-nav-link" href="#account-page" onclick="pageRoter(event)">アカウント</a>
          </li>
          <li class="side-nav-item">
            <a class="side-nav-link" href="#notice-page" onclick="pageRoter(event)">通知</a>
          </li>
          <li class="side-nav-item">
            <a class="side-nav-link" href="#authority-page" onclick="pageRoter(event)">権限</a>
          </li>
        </ul>
      </section>

      <!-- メインセクション -->
      <section class="main-section flex-fill">
        <!-- アカウントページ -->
        <div id="account-page" class="page-content">
          <div class="title-container text-center">
            <h2 class="display-5">アカウント</h2>
          </div>
          <div class="content-container">
            <p>社員コード</p>
            <p>パスワード</p>
          </div>
        </div>

        <!-- 通知ぺージ -->
        <div id="notice-page" class="d-none page-content">
          <div class="title-container text-center">
            <h2 class="display-5">通知</h2>
          </div>
          <div class="content-container">
            <p class="lead">通知を管理します。</p>
            <p>メール</p>
            <p>sms</p>
          </div>
        </div>

        <!-- 権限ページ -->
        <div id="authority-page" class="d-none page-content">
          <div class="title-container text-center">
            <h2 class="display-5">権限</h2>
          </div>
          <div class="content-container">
            <p class="lead">役職とその権限を管理します。</p>
            <p>役職</p>

          </div>
        </div>
      </section>
    </main>
    <!-- コンテンツ（ページ表示内容）ここまで -->

    <!-- BootstrapScript -->
    <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"
      integrity="sha384-geWF76RCwLtnZ8qwWowPQNguL3RmwHVBC9FhGdlKrxdiJJigb/j/68SIy3Te4Bkz"
      crossorigin="anonymous"
    ></script>

    <script src="../js/custom.js"></script>

    <script>

      function pageRoter(e) {
        e.preventDefault();

        const href = e.currentTarget.getAttribute('href');
        const parentElement = e.currentTarget.parentNode;
        const linkElements = document.getElementsByClassName('side-nav-item');
        const elements = {
          account: document.getElementById('account-page'),
          notice: document.getElementById('notice-page'),
          authority: document.getElementById('authority-page')
        };
        const currentPage = document.getElementById(href.slice(1, href.length));

        // スタイル変更
        Array.prototype.forEach.call(
          linkElements,
          linkElement => {
            linkElement.classList.remove('current-location');
          }
        );
        parentElement.classList.add('current-location');

        // すべてのページを非表示
        elements.account.classList.add('d-none');
        elements.notice.classList.add('d-none');
        elements.authority.classList.add('d-none');

        
        // 押されたページを表示
        currentPage.classList.remove('d-none');

        // ページ遷移
        location.replace(location.href.substring(0, location.href.indexOf('#')) + href);

        return false;
      }
    </script>

  </body>
</html>
