<!DOCTYPE html>
<html lang="ja">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- Bootstrap 5.3.0 -->
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-9ndCyUaIbzAi2FUVXJi0CjmCapSmO7SnpJef0486qhLnuZ2cdeRhO02iuK6FUUVM"
      crossorigin="anonymous"
    />

    <!-- Googleフォント -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@300;500&display=swap"
      rel="stylesheet"
    />

    <!-- 独自スタイルシート -->
    <link href="../css/custom.css" rel="stylesheet" />

    <!-- ＝＝＝　これ以降を編集します　＝＝＝＝＝＝ -->

    <!-- 作成者情報 -->
    <meta name="description" content="2024システムデザインⅠ演習" />
    <meta
      name="author"
      content="クラス:CT1 学籍番号:12345678 氏名:〇〇　〇〇"
    />

    <title>ここにページタイルを入力</title>
  </head>

  <body>
    <!-- ヘッダー挿入 -->
    <div id="header"></div>

    <!-- コンテンツ（ページ表示内容）はここ以降に作成します -->
    <main>
      <section>
        <div class="title-container">
          <h1>タイトル</h1>
        </div>

        <div class="content-container"">
          <p>内容</p>
        </div>
      </section>
    </main>
    <!-- コンテンツ（ページ表示内容）ここまで -->
    <!-- ヘッダー挿入 -->
    <script>
      fetch("../ui/header.html")
        .then((response) => response.text())
        .then((data) => (document.querySelector("#header").innerHTML = data));
    </script>

    <!-- BootstrapScript -->
    <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"
      integrity="sha384-geWF76RCwLtnZ8qwWowPQNguL3RmwHVBC9FhGdlKrxdiJJigb/j/68SIy3Te4Bkz"
      crossorigin="anonymous"
    ></script>
    <!-- 独自JavaScript -->
    <script src="js/custom.js"></script>
  </body>
</html>
