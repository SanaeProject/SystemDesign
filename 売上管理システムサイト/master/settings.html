<!DOCTYPE html>
<html lang="ja">
  <head>
    <meta charset="utf-8" >
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- Bootstrap 5.3.0 -->
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-9ndCyUaIbzAi2FUVXJi0CjmCapSmO7SnpJef0486qhLnuZ2cdeRhO02iuK6FUUVM"
      crossorigin="anonymous"
    >

    <!-- Googleフォント -->
    <link rel="preconnect" href="https://fonts.googleapis.com" >
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin >
    <link
      href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@300;500&display=swap"
      rel="stylesheet"
   >

    <!-- 独自スタイルシート -->
    <link href="../css/custom.css" rel="stylesheet">

    <style>
      main {
        height: 100%;
        display: flex;
        flex-direction: row;
      }
      .side-nav-item {
        margin-top: 20px;
      }
      #default-link {
        border-inline-start: 3px solid #c0c0c0;
        padding-left: 2px;
      }
      .side-nav-link {
        padding-left: 5px;
        color: black;
        text-decoration: none;
      }
      .side-nav-link:link{
        color: black;
      }
      .side-nav-link:visited{
        color: black;
      }
      .side-nav-link:hover{
        color: black;
        opacity: 0.7;
        padding-left: 2px;
        border-inline-start: 3px double black;
      }
      .side-nav-link:active{
        color: black;
      }
      .sidebar-section {
        min-width: 200px;
      }
      .main-section {
        width: 80%;
      }
      section div {
        padding-top: 10px;
      }
      @media  screen and (max-width: 600px) {
        main {
          flex-direction: column;
        }
        .main-section {
          width: 100%;
        }
      }
    </style>

    <!-- ＝＝＝　これ以降を編集します　＝＝＝＝＝＝ -->

    <!-- 作成者情報 -->
    <meta name="description" content="2024システムデザインⅠ演習">
    <meta
      name="author"
      content="クラス:CT1 学籍番号:20246124 氏名:布目 純大"
   >

    <title>settings</title>
  </head>

  <body>
    <!-- ヘッダー挿入 -->
    <header id="header"></header>

    <!-- コンテンツ（ページ表示内容）はここ以降に作成します -->
    <main class="flex">
      <h1 class="d-none">スケルトン(見えないよ)</h1>
      <!-- サイドバーセクション -->
      <section class="sidebar-section flex-fill" style="border-inline-end: 1px solid #f8f9fa;">
        <ul class="list-unstyled p-3">
          <li class="side-nav-item">
            <a class="side-nav-link" id="default-link" href="" value="account-page" onclick="pageRoter(event)">アカウント</a>
          </li>
          <li class="side-nav-item">
            <a class="side-nav-link" href="" value="notice-page" onclick="pageRoter(event)">通知</a>
          </li>
          <li class="side-nav-item">
            <a class="side-nav-link" href="" value="authority-page" onclick="pageRoter(event)">権限</a>
          </li>
        </ul>
      </section>

      <!-- メインセクション -->
      <section class="main-section flex-fill">

        <!-- アカウントページ -->
        <div id="account-page">
          <div class="title-container text-center">
            <h2 class="display-5">アカウント</h2>
          </div>
          <div class="content-container">

          </div>
        </div>

        <!-- 通知ぺージ -->
        <div id="notice-page" class="d-none">
          <div class="title-container text-center">
            <h2 class="display-5">通知</h2>
          </div>
          <div class="content-container">
            <p class="lead">通知を管理します。</p>
            <!-- ここに役職と権限の管理に関する内容を追加 -->
          </div>
        </div>

        <!-- 権限ページ -->
        <div id="authority-page" class="d-none">
          <div class="title-container text-center">
            <h2 class="display-5">権限</h2>
          </div>
          <div class="content-container">
            <p class="lead">役職とその権限を管理します。</p>
            <!-- ここに役職と権限の管理に関する内容を追加 -->
          </div>
        </div>
      </section>
    </main>
    <!-- コンテンツ（ページ表示内容）ここまで -->

    <!-- BootstrapScript -->
    <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"
      integrity="sha384-geWF76RCwLtnZ8qwWowPQNguL3RmwHVBC9FhGdlKrxdiJJigb/j/68SIy3Te4Bkz"
      crossorigin="anonymous"
    ></script>

    <script src="../js/custom.js"></script>

    <script>

      function pageRoter(e) {
        e.preventDefault();

        const href = e.currentTarget.getAttribute('value');
        const visibleElement = document.getElementById(href);
        const elements = {
          account: document.getElementById('account-page'),
          notice: document.getElementById('notice-page'),
          authority: document.getElementById('authority-page')
        };

        // すべてのページを非表示
        elements.account.classList.add('d-none');
        elements.notice.classList.add('d-none');
        elements.authority.classList.add('d-none');

        // スタイル変更
        const linkElements = document.getElementsByClassName('side-nav-link');
        Array.prototype.forEach.call(
          linkElements,
          linkElement => {
            linkElement.style.border = "none";
        });
        document.getElementById('default-link').style.border = "none";

        e.currentTarget.style.borderInlineStart = "3px solid #c0c0c0";
        e.currentTarget.style.paddingLeft = "2px";
        
        // 押されたページを表示
        visibleElement.classList.remove('d-none');

        // ページ遷移
        location.replace(location.href.substring(0, location.href.indexOf('#')) + '#' + href);

        return false;
      }
    </script>

  </body>
</html>
