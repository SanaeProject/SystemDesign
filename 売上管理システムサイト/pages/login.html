<html lang="ja">

    <!-- Bootstrap 5.3.0 -->

      rel="stylesheet"
      integrity="sha384-9ndCyUaIbzAi2FUVXJi0CjmCapSmO7SnpJef0486qhLnuZ2cdeRhO02iuK6FUUVM"
      crossorigin="anonymous"
    />

    <!-- Googleフォント -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@300;500&display=swap"
      rel="stylesheet"

    <!-- 独自スタイルシート -->
    <link href="../css/custom.css" rel="stylesheet" />

    <!-- ＝＝＝　これ以降を編集します　＝＝＝＝＝＝ -->

    <!-- 作成者情報 -->
    <meta name="description" content="2024システムデザインⅠ演習" />
    <meta
      name="author"
      content="クラス:CT1A 学籍番号:20246124 氏名:布目 純大"
    />

    <title>売上管理システム/ログイン</title>
  </head>

  <body class="bg-success bg-opacity-25 container pt-5">
    <!-- コンテンツ（ページ表示内容）はここ以降に作成します -->
    <div class="bg-success bg-opacity-25 rounded-4 container py-5">
        <h2 class="text-center text-success-emphasis">ログイン</h2>
        <form id="login" class="mx-auto" style="max-width: 400px;">
            <div class="mb-3">
                <label for="username" class="form-label">社員コード
                </label>
                <input type="text" class="form-control" id="username" placeholder="ユーザー名を入力" required>
            </div>
            <div class="mb-3">
                <label for="password" class="form-label">パスワード</label>
                <input type="password" class="form-control" id="password" placeholder="パスワードを入力" required>
            </div>
            <button type="submit" class="btn btn-outline-success w-100">ログイン</button>
        </form>
    </div>
    <!-- コンテンツ（ページ表示内容）ここまで -->

    <!--  ＝＝＝　これ以降は、共通部分。編集しないでください　＝＝＝＝＝＝ -->
    <!-- BootstrapScript -->
    <script
        src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-geWF76RCwLtnZ8qwWowPQNguL3RmwHVBC9FhGdlKrxdiJJigb/j/68SIy3Te4Bkz"
        crossorigin="anonymous"
    ></script>
    <!-- 独自JavaScript -->
    <script src="../js/custom.js"></script>
    <!-- ログイン処理(仮) -->
    <script>
        document.getElementById("login").addEventListener("submit", function(e) {
            e.preventDefault();
            const username = document.getElementById("username").value;
            const password = document.getElementById("password").value;
            if (username === "admin" && password === "admin") {
                location.href = "home/home.html";
            } else {
                alert("社員コードまたはパスワードが違います");
            }
        }); 
    </script>
    </body>
</html>
