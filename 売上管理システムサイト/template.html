  <body>
    <!-- ヘッダー挿入 -->

    <!-- コンテンツ（ページ表示内容）はここ以降に作成します -->
    <!DOCTYPE html>
    <html lang="ja">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>作業一覧</title>
        <style>
            table {
                width: 100%;
                border-collapse: collapse;
            }
            table, th, td {
                border: 1px solid black;
            }
            th, td {
                padding: 8px;
                text-align: center;
            }
            th {
                background-color: #d3d3d3; /* ヘッダーを濃い灰色に */
            }
            button {
                padding: 5px 10px;
                margin: 2px;
                cursor: pointer;
                border-radius: 8px; /* 角を丸くする */
            }
            .edit-btn {
                background-color: #2196F3; /* 青色 */
                color: white;
            }
            .delete-btn {
                background-color: #f44336; /* 赤色 */
                color: white;
            }
    
            /* 編集フォームのスタイル */
            .edit-form {
                display: none; /* 最初は非表示 */
                margin-top: 20px;
                padding: 10px;
                border: 1px solid #ccc;
                width: 100%;
            }
    
            /* フォームを横並びにする */
            .edit-form form {
                display: flex;
                flex-wrap: wrap;  /* フォームを横並びにして、はみ出す場合は折り返す */
            }
    
            .edit-form label {
                width: 150px;
                margin-right: 10px;
                text-align: right;
            }
    
            .edit-form input {
                flex: 1;
                margin-bottom: 10px;
            }
    
            /* 高速代の入力フィールドを小さくする */
            #editToll {
                width: 120px;  /* 高速代入力フィールドの幅を指定 */
            }
    
            /* ボタンを右側に配置 */
            .edit-form button-container {
                display: flex;
                justify-content: flex-end;
                width: 100%;
                margin-top: 10px;
            }
    
            .edit-form button {
                margin-right: 10px;
            }
        </style>
    </head>
    <body>
    
    <h2>作業一覧</h2>
    
    <!-- 編集フォーム -->
    <div class="edit-form" id="editForm">
        <h3>編集フォーム</h3>
        <form id="editTaskForm">
            <label for="editDate">作業日付:</label>
            <input type="date" id="editDate" name="editDate" required>
            
            <label for="editTime">完了時刻:</label>
            <input type="time" id="editTime" name="editTime" required>
    
            <label for="editTruck">号車:</label>
            <input type="number" id="editTruck" name="editTruck" required>
    
            <label for="editClient">取引先:</label>
            <input type="text" id="editClient" name="editClient" required>
    
            <label for="editLocation">着地:</label>
            <input type="text" id="editLocation" name="editLocation" required>
    
            <label for="editToll">高速代:</label>
            <input type="number" id="editToll" name="editToll" required>
    
            <!-- ボタンを右側に配置 -->
            <div class="button-container">
                <button type="submit">更新</button>
                <button type="button" onclick="closeEditForm()">キャンセル</button>
            </div>
        </form>
    </div>
    
    <table>
        <thead>
            <tr>
                <th>作業日付</th>
                <th>完了時刻</th>
                <th>号車</th>
                <th>取引先</th>
                <th>着地</th>
                <th>高速代</th>
                <th>編集</th>
                <th>削除</th>
            </tr>
        </thead>
        <tbody>
            <tr>
                <td>2025/01/29</td>
                <td>14:30</td>
                <td>1</td>
                <td>取引先A</td>
                <td>地点A</td>
                <td>1000円</td>
                <td><button class="edit-btn" onclick="openEditForm(1)">編集</button></td>
                <td><button class="delete-btn" onclick="deleteRow(this)">削除</button></td>
            </tr>
            <tr>
                <td>2025/01/29</td>
                <td>16:00</td>
                <td>2</td>
                <td>取引先B</td>
                <td>地点B</td>
                <td>800円</td>
                <td><button class="edit-btn" onclick="openEditForm(2)">編集</button></td>
                <td><button class="delete-btn" onclick="deleteRow(this)">削除</button></td>
            </tr>
            <tr>
                <td>2025/01/29</td>
                <td>17:15</td>
                <td>3</td>
                <td>取引先C</td>
                <td>地点C</td>
                <td>1200円</td>
                <td><button class="edit-btn" onclick="openEditForm(3)">編集</button></td>
                <td><button class="delete-btn" onclick="deleteRow(this)">削除</button></td>
            </tr>
            <tr>
                <td>2025/01/30</td>
                <td>09:00</td>
                <td>4</td>
                <td>取引先D</td>
                <td>地点D</td>
                <td>950円</td>
                <td><button class="edit-btn" onclick="openEditForm(4)">編集</button></td>
                <td><button class="delete-btn" onclick="deleteRow(this)">削除</button></td>
            </tr>
        </tbody>
    </table>
    
    <script>
    // 編集フォームを開く関数
    function openEditForm(rowId) {
        // 表の行データを取得してフォームにセット
        const row = document.querySelectorAll('tbody tr')[rowId - 1];
        
        document.getElementById('editDate').value = row.cells[0].textContent;
        document.getElementById('editTime').value = row.cells[1].textContent;
        document.getElementById('editTruck').value = row.cells[2].textContent;
        document.getElementById('editClient').value = row.cells[3].textContent;
        document.getElementById('editLocation').value = row.cells[4].textContent;
        document.getElementById('editToll').value = row.cells[5].textContent.replace('円', '');
    
        // 編集フォームを表示
        document.getElementById('editForm').style.display = 'block';
        
        // フォームが更新された時に保存する機能を追加することも可能
        const form = document.getElementById('editTaskForm');
        form.onsubmit = function(event) {
            event.preventDefault();
            // 更新された内容で行を編集
            row.cells[0].textContent = document.getElementById('editDate').value;
            row.cells[1].textContent = document.getElementById('editTime').value;
            row.cells[2].textContent = document.getElementById('editTruck').value;
            row.cells[3].textContent = document.getElementById('editClient').value;
            row.cells[4].textContent = document.getElementById('editLocation').value;
            row.cells[5].textContent = document.getElementById('editToll').value + '円';
    
            closeEditForm();  // 編集フォームを閉じる
        };
    }
    
    // 編集フォームを閉じる関数
    function closeEditForm() {
        document.getElementById('editForm').style.display = 'none';
    }
    
    // 削除機能を追加
    function deleteRow(button) {
        // 削除する行を取得
        const row = button.closest('tr');
        row.remove();  // 行を削除
    }
    </script>
    
    </body>
    </html>

    ></script>
    
    <script src="../js/custom.js"></script>

  </body>
</html>
