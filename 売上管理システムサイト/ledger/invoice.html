<!DOCTYPE html>
<html lang="ja">
	<head>
	<meta charset="utf-8" />
	<meta name="viewport" content="width=device-width, initial-scale=1.0" />

	<!-- Bootstrap 5.3.0 -->
	<link
		href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
		rel="stylesheet"
		integrity="sha384-9ndCyUaIbzAi2FUVXJi0CjmCapSmO7SnpJef0486qhLnuZ2cdeRhO02iuK6FUUVM"
		crossorigin="anonymous"
	/>

	<!-- Googleフォント -->
	<link rel="preconnect" href="https://fonts.googleapis.com" />
	<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
	<link
		href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@300;500&display=swap"
		rel="stylesheet"
	/>

	<!-- 独自スタイルシート -->
	<link href="../css/custom.css" rel="stylesheet" />

	<!-- ＝＝＝　これ以降を編集します　＝＝＝＝＝＝ -->

	<!-- 作成者情報 -->
	<meta name="description" content="2024システムデザインⅠ演習" />
	<meta
		name="author"
		content="クラス:CT1 学籍番号:20246124 氏名:布目　純大"
	/>

	<style>
		.invoice-header {
			border-bottom: 2px solid #000;
			margin-bottom: 20px;
		}
		.invoice-table th, .invoice-table td {
			padding: 8px;
			border: 1px solid #dee2e6;
		}
		.bank-info {
			border: 1px solid #000;
			padding: 10px;
			margin-top: 20px;
		}
	</style>

	<title>Invoice</title>
	</head>

	<body>
	<!-- ヘッダー挿入 -->
	<header id="header"></header>

	<!-- コンテンツ（ページ表示内容）はここ以降に作成します -->
	<main>
		<section>
		<div class="row mb-4">
			<div class="d-flex justify-content-between align-items-center mb-4">
			<h1 class="mb-4">請求書詳細</h1>
				<a href="./invoice-list.html" class="btn btn-light bg-success-subtle">
				一覧へ戻る
				</a>
			</div>
			<div class="d-flex flex-column" style="height: 70px;">
				<label for="invoiceSelect"></label>
				<select class="h-100" id="invoiceSelect">
					<option value="">-- サンプル請求書を選択 --</option>
				</select>
			</div>
		</div>

		<div class="card">
			<div class="card-body">
				<div class="invoice-header">
					<h2 class="text-center">請求書</h2>
					<div class="text-end" id="resistrationNumber">
						請求番号:
					</div>
					<div class="text-end" id="closingDate">
						年月末締め
					</div>
				</div>

				
			<div class="row md-4">
				<div class="col-6">
					<h3>請求先:</h3>
					<div id="clientName"></div>
				</div>
				<div class="col-6 text-end">
					<h3>請求元:</h3>
					<div>株式会社A運送</div>
					<div>TEL: 0562-00-0000</div>
					<div>FAX: 0562-11-1111</div>
				</div>
			</div>

				<div class="table-responsive">
					<table class="table invoice-table">
						<thead>
							<tr>
								<th>日付</th>
								<th>着地</th>
								<th>金額</th>
							</tr>
						</thead>
						<tbody id="invoiceItems">
						</tbody>
						<tfoot>
							<tr>
								<td colspan="2" class="text-end">小計</td>
								<td id="subtotal">0</td>
							</tr>
							<tr>
								<td colspan="2" class="text-end">消費税 (10%)</td>
								<td id="tax">0</td>
							</tr>
							<tr>
								<td colspan="2" class="text-end">合計</td>
								<td id="total">0</td>
							</tr>
						</tfoot>
					</table>
				</div>

				<div class="bank-info mt-4">
					<h3>振込先</h3>
					<div>○○銀行 ○○支店</div>
					<div>（普通）12345678</div>
					<div>愛知県名古屋市○○○○</div>
				</div>
			</div>
		</div>
		<div class="my-3 text-center">
			<button class="w-25 btn btn-outline-success bg-opacity-10">作成</button>
		</div>
		</section>
	</main>
	<!-- コンテンツ（ページ表示内容）ここまで -->

	<!-- BootstrapScript -->
	<script
		src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"
		integrity="sha384-geWF76RCwLtnZ8qwWowPQNguL3RmwHVBC9FhGdlKrxdiJJigb/j/68SIy3Te4Bkz"
		crossorigin="anonymous"
	></script>

	<script src="../js/custom.js"></script>
	<script src="../js/invoice-create.js"></script>
	<script src="../js/invoice.js"></script>

	</body>
</html>
