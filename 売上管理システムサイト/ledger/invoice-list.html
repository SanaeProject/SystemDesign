<!DOCTYPE html>
<html lang="ja">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- Bootstrap 5.3.0 -->
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-9ndCyUaIbzAi2FUVXJi0CjmCapSmO7SnpJef0486qhLnuZ2cdeRhO02iuK6FUUVM"
      crossorigin="anonymous"
    />

    <!-- Googleフォント -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@300;500&display=swap"
      rel="stylesheet"
    />

    <!-- 独自スタイルシート -->
    <link href="../css/custom.css" rel="stylesheet" />

    <!-- ＝＝＝　これ以降を編集します　＝＝＝＝＝＝ -->

    <!-- 作成者情報 -->
    <meta name="description" content="2024システムデザインⅠ演習" />
    <meta
      name="author"
      content="クラス:CT1 学籍番号:12345678 氏名:〇〇　〇〇"
    />

    <style>
        .search-box {
            background-color: #f8f9fa;
            padding: 20px;
            border-radius: 5px;
            margin-bottom: 20px;
        }
        .table th {
            background-color: #f8f9fa;
        }
        .status-badge {
            width: 100px;
        }
        .invoice-detail {
            display: none;
        }
        .invoice-header {
            border-bottom: 2px solid #000;
            margin-bottom: 20px;
        }
        .invoice-table th, .invoice-table td {
            padding: 8px;
            border: 1px solid #dee2e6;
        }
        .bank-info {
            border: 1px solid #000;
            padding: 10px;
            margin-top: 20px;
        }
    </style>

    <title>請求書一覧</title>
  </head>

  <body>
    <!-- ヘッダー挿入 -->
    <header id="header"></header>

    <!-- コンテンツ（ページ表示内容）はここ以降に作成します -->
    <main>
      <section>
				<div class="d-flex justify-content-between align-items-center mb-4">
					<h1 class="mb-4">請求書一覧</h1>
					<a href="./invoice.html" class="btn btn-light bg-success-subtle">
						新規作成
					</a>
				</div>

        <div class="content-container">

            <!-- 検索ボックス -->
							<div class="search-box">
									<div class="row g-3">
											<div class="col-md-3">
													<label class="form-label">請求期間</label>
													<select class="form-select" id="period">
                            <option>2025年1月</option>
                            <option>2025年2月</option>
                            <option>2025年3月</option>
                        </select>
                    </div>
                    <div class="col-md-3">
											<label class="form-label" for="client">取引先</label>
											<select class="form-select" id="client">
												<option value="">取引先を選択
												</option>
											</select>
                    </div>
                    <div class="col-md-3">
                        <label for="status" class="form-label">状態</label>
                        <select id="status" class="form-select">
                            <option value="all">すべて</option>
                            <option value="未請求">未請求</option>
                            <option value="請求済み">請求済み</option>
                            <option value="入金済み">入金済み</option>
                        </select>
                    </div>
                    <div class="col-md-3 d-flex align-items-end">
                        <button class="btn btn-primary w-100" onclick="filterInvoices()">
                            <i class="fas fa-search me-2"></i>検索
                        </button>
                    </div>
                </div>
            </div>

            <!-- 請求書一覧テーブル -->
            <div class="table-responsive">
                <table class="table table-hover">
                    <thead>
                        <tr>
                            <th>請求番号</th>
                            <th>取引先名</th>
                            <th>請求日</th>
                            <th>請求金額</th>
                            <th>状態</th>
                            <th>操作</th>
                        </tr>
                    </thead>
                    <tbody id="invoiceList">
                    </tbody>
                </table>
            </div>

            <!-- 請求書詳細セクション -->
            <div id="invoiceDetail" class="invoice-detail mb-4">
                <div class="card">
                    <div class="card-body">
                        <div class="d-flex justify-content-between align-items-center mb-3">
                            <h3>請求書詳細</h3>
                            <button class="btn btn-outline-secondary" onclick="hideInvoiceDetail()">
                                <i class="fas fa-times"></i> 閉じる
                            </button>
                        </div>
                        <div class="invoice-header">
					<h2 class="text-center">請求書</h2>
					<div class="text-end" id="resistrationNumber">
						請求番号:
					</div>
					<div class="text-end" id="closingDate">
						年月末締め
					</div>
				</div>

				
			<div class="row md-4">
				<div class="col-6">
					<h3>請求先:</h3>
					<div id="clientName"></div>
				</div>
				<div class="col-6 text-end">
					<h3>請求元:</h3>
					<div>株式会社A運送</div>
					<div>TEL: 0562-00-0000</div>
					<div>FAX: 0562-11-1111</div>
				</div>
			</div>

				<div class="table-responsive">
					<table class="table invoice-table">
						<thead>
							<tr>
								<th>日付</th>
								<th>着地</th>
								<th>金額</th>
							</tr>
						</thead>
						<tbody id="invoiceItems">
						</tbody>
						<tfoot>
							<tr>
								<td colspan="2" class="text-end">小計</td>
								<td id="subtotal">0</td>
							</tr>
							<tr>
								<td colspan="2" class="text-end">消費税 (10%)</td>
								<td id="tax">0</td>
							</tr>
							<tr>
								<td colspan="2" class="text-end">合計</td>
								<td id="total">0</td>
							</tr>
						</tfoot>
					</table>
				</div>

				<div class="bank-info mt-4">
					<h3>振込先</h3>
					<div>○○銀行 ○○支店</div>
					<div>（普通）12345678</div>
					<div>愛知県名古屋市○○○○</div>
				</div>
			</div>
                    </div>
                </div>
            </div>

            <!-- ページネーション -->
            <nav aria-label="Page navigation">
                <ul class="pagination justify-content-center">
                    <li class="page-item disabled">
                        <a class="page-link" href="#" tabindex="-1">前へ</a>
                    </li>
                    <li class="page-item active"><a class="page-link" href="#">1</a></li>
                    <li class="page-item"><a class="page-link" href="#">2</a></li>
                    <li class="page-item"><a class="page-link" href="#">3</a></li>
                    <li class="page-item">
                        <a class="page-link" href="#">次へ</a>
                    </li>
                </ul>
            </nav>
        </div>
      </section>
    </main>
    <!-- コンテンツ（ページ表示内容）ここまで -->

    <!-- BootstrapScript -->
    <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"
      integrity="sha384-geWF76RCwLtnZ8qwWowPQNguL3RmwHVBC9FhGdlKrxdiJJigb/j/68SIy3Te4Bkz"
      crossorigin="anonymous"
    ></script>
    
    <script src="../js/custom.js"></script>
		<script src="../js/invoice-data.js"></script>
    <script src="../js/invoice-list.js"></script>

  </body>
</html>
